name: 🛡️ Warrior CI/CD Pipeline - Complete Automation

on:
  push:
    branches: [main, develop, staging]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  schedule:
    # Weekly security scan - Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      skip_tests:
        description: 'Skip test suite'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  WARRIOR_EMAIL: nike49424@gmail.com

permissions:
  contents: write
  packages: write
  pull-requests: write
  security-events: write
  deployments: write
  issues: write
  actions: read

jobs:
  # ============================================================================
  # JOB 1: CODE QUALITY & LINTING
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          npm install -g eslint prettier markdownlint-cli
      - name: 🎨 Run Prettier
        run: |
          npx prettier --check "**/*.{js,jsx,ts,tsx,json,md,yml,yaml}"
      - name: 🔎 ESLint Analysis
        run: |
          npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0
      - name: 📝 Markdown Lint
        run: |
          markdownlint '**/*.md' --ignore node_modules
      - name: 📊 Code Complexity Analysis
        run: |
          npx complexity-report --format json --output complexity-report.json src/
      - name: 📤 Upload Complexity Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: complexity-report
          path: complexity-report.json
          retention-days: 30

  # ============================================================================
  # JOB 2: SECURITY SCANNING
  # ============================================================================
  security-scan:
    name: 🛡️ Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline
      - name: 🔒 npm Audit
        id: npm-audit
        continue-on-error: true
        run: |
          npm audit --production --audit-level=moderate --json > npm-audit.json
          cat npm-audit.json
      - name: 🔍 Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
      - name: 🕵️ GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - name: 🔐 Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: 📤 Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      - name: 📊 Generate Security Report
        if: always()
        run: |
          echo "# 🛡️ Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Scan Date:** $(date)" >> security-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> security-report.md
          echo "**Commit:** ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md
          echo "## npm Audit Results" >> security-report.md
          echo '```json' >> security-report.md
          cat npm-audit.json >> security-report.md
          echo '```' >> security-report.md
      - name: 📤 Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            npm-audit.json
            snyk-report.json
            trivy-results.sarif
            security-report.md
          retention-days: 90
      - name: 🚨 Fail on Critical Vulnerabilities
        if: steps.npm-audit.outcome == 'failure'
        run: |
          echo "🚨 CRITICAL: Security vulnerabilities detected!"
          echo "📧 Contact: ${{ env.WARRIOR_EMAIL }}"
          exit 1

  # ============================================================================
  # JOB 3: AUTOMATED TESTING
  # ============================================================================
  test:
    name: 🧪 Test Suite
    runs-on: ${{ matrix.os }}
    if: ${{ !inputs.skip_tests }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18.x', '20.x', '21.x']
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🧪 Run Unit Tests
        run: npm run test:unit -- --coverage --maxWorkers=2
      - name: 🔗 Run Integration Tests
        run: npm run test:integration
        env:
          CI: true
      - name: 🌐 Run E2E Tests
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        run: npm run test:e2e
        env:
          CI: true
      - name: 📊 Upload Coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-${{ matrix.os }}-${{ matrix.node-version }}
          fail_ci_if_error: false
      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 30

  # ============================================================================
  # JOB 4: BUILD & PACKAGE
  # ============================================================================
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, test]
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline
      - name: 🏗️ Build Application
        run: |
          npm run build
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
      - name: 📦 Create Package
        run: npm pack
      - name: 📊 Analyze Bundle Size
        run: |
          npx webpack-bundle-analyzer dist/stats.json --mode static --no-open
      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            *.tgz
          retention-days: 30
      - name: 💾 Cache Build
        uses: actions/cache@v4
        with:
          path: |
            dist/
            node_modules/
          key: build-${{ github.sha }}
          restore-keys: |
            build-${{ github.ref_name }}-

  # ============================================================================
  # JOB 5: DOCKER BUILD & PUSH
  # ============================================================================
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📊 Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ env.BUILD_TIME }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
      
      - name: 🔍 Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'docker-scan-results.sarif'
      
      - name: 📤 Upload Docker Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'docker-scan-results.sarif'

  # ============================================================================
  # JOB 6: DEPLOYMENT
  # ============================================================================
  deploy:
    name: 🚀 Deploy to ${{ inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    environment:
      name: ${{ inputs.environment || 'staging' }}
      url: https://${{ inputs.environment || 'staging' }}.example.com
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: 🚀 Deploy to Kubernetes
        run: |
          kubectl set image deployment/warrior-app \
            warrior-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --namespace=${{ inputs.environment || 'staging' }}
      
      - name: ⏳ Wait for Rollout
        run: |
          kubectl rollout status deployment/warrior-app \
            --namespace=${{ inputs.environment || 'staging' }} \
            --timeout=5m
      
      - name: 🏥 Health Check
        run: |
          curl -f https://${{ inputs.environment || 'staging' }}.example.com/health || exit 1
      
      - name: 🎉 Create Deployment Record
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ inputs.environment || 'staging' }}
          deployment-status: success

  # ============================================================================
  # JOB 7: PERFORMANCE TESTING
  # ============================================================================
  performance:
    name: ⚡ Performance Testing
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      - name: ⚡ Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://staging.example.com
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: 🔥 Artillery Load Test
        run: |
          npm install -g artillery
          artillery run tests/load/scenario.yml --output report.json
      - name: 📊 Generate Performance Report
        run: |
          artillery report report.json --output performance-report.html
      - name: 📤 Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            lighthouse-report.html
            performance-report.html
          retention-days: 30

  # ============================================================================
  # JOB 8: NOTIFICATIONS
  # ============================================================================
  notify:
    name: 📢 Send Notifications
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, test, build, docker, deploy]
    if: always()
    timeout-minutes: 5
    steps:
      - name: 💬 Slack Notification
        uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK != ''
        with:
          status: ${{ job.status }}
          text: |
            🛡️ Warrior CI/CD Pipeline: ${{ job.status }}
            📋 Workflow: ${{ github.workflow }}
            🌿 Branch: ${{ github.ref_name }}
            💬 Commit: ${{ github.event.head_commit.message }}
            👤 Author: ${{ github.actor }}
            🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ env.SLACK_WEBHOOK }}
      - name: 📧 Email Notification
        uses: dawidd6/action-send-mail@v3
        if: failure()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 🚨 CI/CD Pipeline Failed - ${{ github.repository }}
          to: ${{ env.WARRIOR_EMAIL }}
          from: Warrior CI/CD Bot
          body: |
            Pipeline failed for repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Protected by asrar-mared (Digital Warrior)
      - name: 💬 Create Issue on Failure
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 CI/CD Pipeline Failed - ' + context.ref,
              body: `## Pipeline Failure Report
              **Workflow:** ${context.workflow}
              **Branch:** ${context.ref}
              **Commit:** ${context.sha}
              **Actor:** ${context.actor}
              **Run URL:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              **Protected By:** asrar-mared (Digital Warrior)
              **Contact:** nike49424@gmail.com
              Please investigate and resolve.`,
              labels: ['ci-cd', 'bug', 'urgent']
            })

  # ============================================================================
  # JOB 9: CLEANUP
  # ============================================================================
  cleanup:
    name: 🧹 Cleanup & Maintenance
    runs-on: ubuntu-latest
    needs: [notify]
    if: always()
    timeout-minutes: 5
    steps:
      - name: 🗑️ Delete Old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const days = 30;
            const timestamp = Date.now() - (days * 24 * 60 * 60 * 1000);
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const artifact of artifacts.data.artifacts) {
              if (Date.parse(artifact.created_at) < timestamp) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }
      - name: 📊 Update Status Badge
        run: |
          echo "Pipeline completed successfully"
