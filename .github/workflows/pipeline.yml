name: Zayed Shield Secure Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read
  security-events: write

env:
  MAX_FILE_SIZE: 10485760

jobs:

# =========================
# SECURITY + QUALITY CHECK
# =========================
  security:
    name: Security & Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH

      - name: Run Bandit Python scan
        run: |
          pip install bandit
          bandit -r . || true

      - name: ShellCheck scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -type f | xargs -r shellcheck

      - name: Validate YAML
        run: |
          pip install yamllint
          find . -name "*.yml" -o -name "*.yaml" | xargs -r yamllint

      - name: Check file sizes
        run: |
          violations=0
          while IFS= read -r file; do
            size=$(stat -c%s "$file")
            if [ "$size" -gt "$MAX_FILE_SIZE" ]; then
              echo "File too large: $file"
              violations=$((violations+1))
            fi
          done < <(find . -type f -not -path "./.git/*" -not -path "./.github/*")

          if [ "$violations" -gt 0 ]; then
            exit 1
          fi

      - name: Generate checksums
        run: |
          find . -type f \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          -exec sha256sum {} \; > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt

# =========================
# BUILD
# =========================
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: security

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify scripts
        run: |
          if [ -f install.sh ]; then
            bash -n install.sh
          fi

          if [ -f zayed-shield.sh ]; then
            bash -n zayed-shield.sh
          fi

      - name: Generate build metadata
        run: |
          cat > build-info.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "actor": "${{ github.actor }}"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build-info.json

# =========================
# DEPLOY PAGES
# =========================
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare site
        run: |
          mkdir site
          cp README.md site/ || true
          cp checksums.txt site/ || true
          cp build-info.json site/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

# =========================
# VERIFY
# =========================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:

      - name: Wait for deployment
        run: sleep 20

      - name: Health check
        run: |
          URL="https://nike4565.github.io/Zayed-Shield/"
          if curl -sSf "$URL" > /dev/null; then
            echo "Site reachable"
          else
            echo "Site not yet reachable"
          fi
