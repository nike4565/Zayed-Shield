name: SBOM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies if package.json exists
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm install || npm install --package-lock-only || true
          else
            echo "No package.json found"
          fi

      - name: Generate SBOM
        shell: bash
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          if [ -f package.json ]; then
            cyclonedx-npm --output-file sbom.json || echo "{}" > sbom.json
          else
            echo "{}" > sbom.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
