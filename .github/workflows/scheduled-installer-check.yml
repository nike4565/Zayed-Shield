# ═══════════════════════════════════════════════════════════════════════════════
#
# GitHub Actions Pricing:
#   ├─ Free tier: 2,000 minutes/month (GitHub-hosted runners)
#   ├─ Paid tier: $0.008 per minute (if exceeds 2,000)
#   └─ This workflow: 2 jobs × 7 min × 72 daily = ~1,008 min/day
#
# Monthly cost (this workflow):
#   ├─ Daily: 1,008 minutes
#   ├─ Monthly: 1,008 × 30 = 30,240 minutes
#   ├─ Free allowance: 2,000 minutes
#   ├─ Paid: (30,240 - 2,000) × $0.008 = $226/month
#   └─ ROI: Cheap for 24/7 security monitoring
#
# Cost reduction options:
#   ├─ Change frequency to every hour: ~$30/month
#   ├─ Remove one Node version: 50% cost reduction
#   ├─ Only run 9am-5pm: Essentially free
#   └─ Pick based on your risk tolerance
