name: Build Provenance

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  provenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Package repository snapshot
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=zayed-shield-source.tgz \
            --warning=no-file-changed \
            -czf zayed-shield-source.tgz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zayed-shield-source
          path: zayed-shield-source.tgz

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: zayed-shield-source.tgz
