name: Generate SBOM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SBOM with CycloneDX
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm install --package-lock-only --ignore-scripts || true
            npx @cyclonedx/cyclonedx-npm --output-file sbom.json
          else
            echo '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1,"metadata":{"component":{"name":"Zayed-Shield","type":"application"}},"components":[]}' > sbom.json
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
