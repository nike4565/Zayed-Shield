name: Zayed Shield Security Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  security-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write GitHub App private key
        run: |
          printf '%s' "${{ secrets.GH_APP_PRIVATE_KEY }}" > private-key.pem
          chmod 600 private-key.pem

      - name: Update SECURITY_BOT.md locally
        run: |
          cat > SECURITY_BOT.md <<'MD'
          # Security Bot
          Updated automatically by GitHub Actions via Zayed Shield Security App.
          MD

      - name: Install Python dependencies
        run: pip install PyJWT cryptography

      - name: Generate JWT
        run: |
          python - <<'PY' > jwt.txt
          import time
          import jwt

          client_id = "${{ secrets.GH_APP_CLIENT_ID }}"
          with open("private-key.pem", "rb") as f:
              signing_key = f.read()

          payload = {
              "iat": int(time.time()) - 60,
              "exp": int(time.time()) + 600,
              "iss": client_id,
          }

          token = jwt.encode(payload, signing_key, algorithm="RS256")
          print(token)
          PY

      - name: Create installation token
        id: install_token
        run: |
          JWT=$(cat jwt.txt)
          INSTALL_ID=$(curl -s -H "Authorization: Bearer $JWT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/app/installations | jq -r '.[0].id')
          TOKEN=$(curl -s -X POST \
            -H "Authorization: Bearer $JWT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/app/installations/$INSTALL_ID/access_tokens \
            | jq -r '.token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config user.name "Zayed Shield Bot"
          git config user.email "bot@zayed-shield.dev"
          git add SECURITY_BOT.md
          git diff --cached --quiet || git commit -m "bot: security status update [skip ci]"
          git push https://x-access-token:${{ steps.install_token.outputs.token }}@github.com/${{ github.repository }}.git
