# المسار: .github/workflows/security-scan.yml
permissions:
  contents: read

# 🛡️ المارد الرقمي - نظام الفحص الأمني المتقدم
# نظام شامل للكشف عن الثغرات والحماية الاستباقية

name: 🔒 المارد الرقمي - الفحص الأمني الشامل

on:
  # تشغيل عند كل Push و Pull Request
  push:
    branches: [ main, develop, staging ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]
  
  # فحص أمني يومي تلقائي
  schedule:
    - cron: '0 2 * * *'  # كل يوم الساعة 2 صباحاً
    - cron: '0 14 * * *' # كل يوم الساعة 2 ظهراً
  
  # تشغيل يدوي
  workflow_dispatch:
    inputs:
      scan_level:
        description: 'مستوى الفحص'
        required: true
        default: 'full'
        type: choice
        options:
          - quick
          - standard
          - full
          - deep
      notify_team:
        description: 'إرسال تنبيهات للفريق'
        required: false
        type: boolean
        default: true

# أذونات محدودة للأمان القصوى
permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write
  actions: read
  checks: write

env:
  SCAN_TIMEOUT: 45
  MAX_CRITICAL_ISSUES: 0
  MAX_HIGH_ISSUES: 5
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18.x'
  GO_VERSION: '1.21'

jobs:
  # ========================================
  # المرحلة 1: تحليل أولي وإعداد البيئة
  # ========================================
  pre-scan-analysis:
    name: 📋 التحليل الأولي
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_dockerfile: ${{ steps.check.outputs.has_dockerfile }}
      has_package_json: ${{ steps.check.outputs.has_package_json }}
      has_requirements: ${{ steps.check.outputs.has_requirements }}
      has_go_mod: ${{ steps.check.outputs.has_go_mod }}
      project_languages: ${{ steps.detect.outputs.languages }}
      
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔍 فحص محتويات المشروع
        id: check
        run: |
          echo "has_dockerfile=$([ -f Dockerfile ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_package_json=$([ -f package.json ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_requirements=$([ -f requirements.txt ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_go_mod=$([ -f go.mod ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
      
      - name: 🌐 كشف اللغات المستخدمة
        id: detect
        run: |
          languages=""
          [ -f "*.js" ] || [ -f "*.ts" ] && languages="${languages}javascript,"
          [ -f "*.py" ] && languages="${languages}python,"
          [ -f "*.go" ] && languages="${languages}go,"
          [ -f "*.java" ] && languages="${languages}java,"
          echo "languages=${languages}" >> $GITHUB_OUTPUT
          echo "🔍 اللغات المكتشفة: ${languages}"

  # ========================================
  # المرحلة 2: فحص الأسرار والبيانات الحساسة
  # ========================================
  secrets-detection:
    name: 🔐 كشف الأسرار المسربة
    runs-on: ubuntu-latest
    needs: pre-scan-analysis
    timeout-minutes: 20
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔍 TruffleHog - فحص الأسرار
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
      
      - name: 🕵️ GitLeaks - فحص تسريب البيانات
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      
      - name: 🔎 فحص ملفات البيئة والمفاتيح
        run: |
          echo "🔍 البحث عن ملفات حساسة..."
          
          # البحث عن ملفات البيئة
          find . -type f \( -name "*.env*" -o -name ".env.*" \) ! -name "*.example" | while read file; do
            if [ -f "$file" ]; then
              echo "⚠️ تحذير: ملف بيئة موجود: $file"
              exit 1
            fi
          done
          
          # البحث عن مفاتيح SSH
          find . -type f \( -name "*.pem" -o -name "*.key" -o -name "id_rsa*" \) | while read file; do
            if [ -f "$file" ]; then
              echo "🚨 خطر: مفتاح SSH موجود: $file"
              exit 1
            fi
          done
          
          # البحث عن ملفات الاعتماد
          find . -type f \( -name "*credentials*" -o -name "*password*" -o -name "*secret*" \) \
            ! -path "*/node_modules/*" ! -path "*/.git/*" | while read file; do
            if [ -f "$file" ]; then
              echo "⚠️ ملف اعتماد محتمل: $file"
            fi
          done
          
          echo "✅ فحص الملفات الحساسة مكتمل"
      
      - name: 🔐 فحص الأنماط الحساسة في الكود
        run: |
          echo "🔍 فحص الأنماط الخطرة..."
          
          # AWS Keys
          if grep -r "AKIA[0-9A-Z]{16}" . --exclude-dir={.git,node_modules}; then
            echo "🚨 تم العثور على مفاتيح AWS!"
            exit 1
          fi
          
          # Google API Keys
          if grep -r "AIza[0-9A-Za-z\\-_]{35}" . --exclude-dir={.git,node_modules}; then
            echo "🚨 تم العثور على مفاتيح Google API!"
            exit 1
          fi
          
          # Generic API Keys
          if grep -ri "api[_-]key.*['\"][0-9a-zA-Z]{32,}['\"]" . --exclude-dir={.git,node_modules}; then
            echo "⚠️ تم العثور على مفاتيح API محتملة!"
          fi
          
          # Database URLs with passwords
          if grep -ri "mongodb.*://.*:.*@" . --exclude-dir={.git,node_modules}; then
            echo "🚨 تم العثور على URLs قواعد بيانات بكلمات مرور!"
            exit 1
          fi
          
          echo "✅ فحص الأنماط مكتمل"

  # ========================================
  # المرحلة 3: تحليل الكود الثابت - CodeQL
  # ========================================
  codeql-analysis:
    name: 🔬 تحليل CodeQL المتقدم
    runs-on: ubuntu-latest
    needs: [pre-scan-analysis, secrets-detection]
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔧 إعداد CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml
      
      - name: 🏗️ البناء التلقائي
        uses: github/codeql-action/autobuild@v3
      
      - name: 🔍 تحليل CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: sarif-results
          upload: true

  # ========================================
  # المرحلة 4: فحص التبعيات والثغرات
  # ========================================
  dependency-scan:
    name: 📦 فحص التبعيات
    runs-on: ubuntu-latest
    needs: pre-scan-analysis
    timeout-minutes: 25
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔧 إعداد Node.js
        if: needs.pre-scan-analysis.outputs.has_package_json == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 🔧 إعداد Python
        if: needs.pre-scan-analysis.outputs.has_requirements == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📊 NPM Audit - فحص حزم Node
        if: needs.pre-scan-analysis.outputs.has_package_json == 'true'
        continue-on-error: true
        run: |
          npm ci --prefer-offline
          npm audit --audit-level=moderate --json > npm-audit.json
          
          # تحليل النتائج
          critical=$(cat npm-audit.json | jq '.metadata.vulnerabilities.critical')
          high=$(cat npm-audit.json | jq '.metadata.vulnerabilities.high')
          
          echo "🔍 ثغرات حرجة: $critical"
          echo "⚠️ ثغرات عالية: $high"
          
          if [ "$critical" -gt "$MAX_CRITICAL_ISSUES" ]; then
            echo "🚨 تم تجاوز الحد المسموح للثغرات الحرجة!"
            exit 1
          fi
      
      - name: 🐍 Safety Check - فحص حزم Python
        if: needs.pre-scan-analysis.outputs.has_requirements == 'true'
        run: |
          pip install safety
          safety check -r requirements.txt --json > safety-report.json || true
          
          # عرض النتائج
          echo "📊 تقرير Safety:"
          cat safety-report.json | jq '.'
      
      - name: 🔍 Snyk - فحص شامل للثغرات
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
      
      - name: 📊 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Digital-warrior-secrets'
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7
      
      - name: 📤 رفع تقارير الثغرات
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-reports
          path: |
            npm-audit.json
            safety-report.json
            snyk-report.json
            dependency-check-report.html
          retention-days: 30

  # ========================================
  # المرحلة 5: فحص أمان Docker
  # ========================================
  docker-security-scan:
    name: 🐳 فحص أمان Docker
    runs-on: ubuntu-latest
    needs: pre-scan-analysis
    if: needs.pre-scan-analysis.outputs.has_dockerfile == 'true'
    timeout-minutes: 20
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔧 إعداد Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🏗️ بناء صورة Docker
        run: |
          docker build -t digital-warrior:${{ github.sha }} .
          docker tag digital-warrior:${{ github.sha }} digital-warrior:latest
      
      - name: 🔍 Trivy - فحص الصورة الشامل
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: digital-warrior:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          vuln-type: 'os,library'
          exit-code: '1'
      
      - name: 🔒 Hadolint - فحص Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
      
      - name: 🔐 Dockle - فحص أمان الصورة
        run: |
          VERSION=$(curl --silent "https://api.github.com/repos/goodwithtech/dockle/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -L -o dockle.tar.gz https://github.com/goodwithtech/dockle/releases/download/v${VERSION}/dockle_${VERSION}_Linux-64bit.tar.gz
          tar zxvf dockle.tar.gz
          sudo mv dockle /usr/local/bin
          
          dockle --exit-code 1 --exit-level warn digital-warrior:${{ github.sha }}
      
      - name: 🔍 Grype - فحص ثغرات إضافي
        uses: anchore/scan-action@v3
        with:
          image: digital-warrior:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
      
      - name: 📊 رفع نتائج Trivy
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ========================================
  # المرحلة 6: فحص OWASP للثغرات
  # ========================================
  owasp-zap-scan:
    name: 🕷️ فحص OWASP ZAP
    runs-on: ubuntu-latest
    needs: [secrets-detection, codeql-analysis]
    timeout-minutes: 30
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔧 إعداد التطبيق للاختبار
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build || true
            npm start &
            sleep 10
          fi
      
      - name: 🕷️ ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
      
      - name: 🕸️ ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.8.0
        if: github.ref == 'refs/heads/main'
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
      
      - name: 📊 رفع تقرير ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: |
            zap-report.html
            zap-report.json
          retention-days: 30

  # ========================================
  # المرحلة 7: فحص الكود الخطر والممارسات السيئة
  # ========================================
  code-security-patterns:
    name: 🚨 فحص الأنماط الخطرة
    runs-on: ubuntu-latest
    needs: pre-scan-analysis
    timeout-minutes: 15
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔍 فحص JavaScript/TypeScript الخطر
        run: |
          echo "🔍 فحص أنماط JavaScript الخطرة..."
          
          # eval() usage
          if grep -rn "eval(" --include="*.js" --include="*.ts" --exclude-dir=node_modules .; then
            echo "🚨 تحذير: استخدام eval() خطر جداً!"
            echo "eval_found=true" >> $GITHUB_ENV
          fi
          
          # Function constructor
          if grep -rn "new Function(" --include="*.js" --include="*.ts" --exclude-dir=node_modules .; then
            echo "🚨 تحذير: استخدام Function constructor خطر!"
          fi
          
          # innerHTML without sanitization
          if grep -rn "innerHTML.*=" --include="*.js" --include="*.jsx" --exclude-dir=node_modules . | grep -v "sanitize"; then
            echo "⚠️ تحذير: استخدام innerHTML بدون تعقيم!"
          fi
          
          # dangerouslySetInnerHTML
          if grep -rn "dangerouslySetInnerHTML" --include="*.jsx" --include="*.tsx" --exclude-dir=node_modules .; then
            echo "⚠️ تحذير: استخدام dangerouslySetInnerHTML!"
          fi
          
          # document.write
          if grep -rn "document.write" --include="*.js" --include="*.ts" --exclude-dir=node_modules .; then
            echo "⚠️ تحذير: استخدام document.write خطر!"
          fi
      
      - name: 🐍 فحص Python الخطر
        run: |
          echo "🔍 فحص أنماط Python الخطرة..."
          
          # exec() usage
          if grep -rn "exec(" --include="*.py" --exclude-dir=venv .; then
            echo "🚨 تحذير: استخدام exec() خطر!"
          fi
          
          # eval() usage
          if grep -rn "eval(" --include="*.py" --exclude-dir=venv .; then
            echo "🚨 تحذير: استخدام eval() خطر!"
          fi
          
          # pickle without validation
          if grep -rn "pickle.loads" --include="*.py" --exclude-dir=venv .; then
            echo "⚠️ تحذير: استخدام pickle.loads بدون تحقق!"
          fi
          
          # SQL injection patterns
          if grep -rn "execute.*%.*%" --include="*.py" --exclude-dir=venv .; then
            echo "🚨 تحذير: احتمال SQL injection!"
          fi
      
      - name: 🔒 فحص أنماط الأمان
        run: |
          echo "🔍 فحص أنماط الأمان العامة..."
          
          # Hardcoded IPs
          if grep -rn "[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}" . \
            --include="*.js" --include="*.py" --exclude-dir={node_modules,venv} | grep -v "127.0.0.1\|0.0.0.0\|localhost"; then
            echo "⚠️ تحذير: عناوين IP مكتوبة في الكود!"
          fi
          
          # TODO/FIXME security comments
          if grep -rni "TODO.*security\|FIXME.*security\|XXX.*security" . \
            --exclude-dir={node_modules,venv,.git}; then
            echo "⚠️ ملاحظة: توجد تعليقات أمنية غير مكتملة"
          fi
      
      - name: ❌ فشل إذا وجدت أنماط خطرة
        if: env.eval_found == 'true'
        run: |
          echo "🚨 فشل الفحص: تم العثور على أنماط خطرة في الكود!"
          exit 1

  # ========================================
  # المرحلة 8: فحص الترخيص والامتثال
  # ========================================
  license-compliance:
    name: 📜 فحص التراخيص
    runs-on: ubuntu-latest
    needs: pre-scan-analysis
    timeout-minutes: 15
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔧 إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 تثبيت license-checker
        run: npm install -g license-checker
      
      - name: 🔍 فحص تراخيص NPM
        if: needs.pre-scan-analysis.outputs.has_package_json == 'true'
        run: |
          npm ci
          license-checker --json --out licenses-npm.json
          
          # فحص التراخيص المحظورة
          license-checker --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD" || echo "⚠️ تحذير: تراخيص غير مسموحة"
      
      - name: 📜 فحص ملف LICENSE
        run: |
          if [ ! -f LICENSE ]; then
            echo "⚠️ تحذير: ملف LICENSE غير موجود!"
            exit 1
          fi
          echo "✅ ملف LICENSE موجود"
      
      - name: 📤 رفع تقرير التراخيص
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: licenses-npm.json
          retention-days: 30

  # ========================================
  # المرحلة 9: اختبار الاختراق الأساسي
  # ========================================
  penetration-testing:
    name: 🎯 اختبار الاختراق
    runs-on: ubuntu-latest
    needs: [codeql-analysis, dependency-scan]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 40
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔧 إعداد بيئة الاختبار
        run: |
          docker-compose up -d || echo "No docker-compose file"
          sleep 15
      
      - name: 🎯 Nuclei - فحص الثغرات
        uses: projectdiscovery/nuclei-action@main
        with:
          target: http://localhost:3000
          templates: cves,vulnerabilities,exposures
      
      - name: 🔍 Nikto - فحص الويب
        run: |
          docker run --network host frapsoft/nikto -h http://localhost:3000 -output nikto-report.html || true
      
      - name: 📊 رفع تقارير الاختراق
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: penetration-test-reports
          path: |
            nuclei-report.json
            nikto-report.html
          retention-days: 30

  # ========================================
  # المرحلة 10: التقرير النهائي والإشعارات
  # ========================================
  security-report:
    name: 📊 التقرير الأمني النهائي
    runs-on: ubuntu-latest
    needs: [
      secrets-detection,
      codeql-analysis,
      dependency-scan,
      docker-security-scan,
      owasp-zap-scan,
      code-security-patterns,
      license-compliance
    ]
    if: always()
    timeout-minutes: 10
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 📥 تحميل جميع التقارير
        uses: actions/download-artifact@v4
        with:
          path: security-reports
      
      - name: 📊 إنشاء تقرير شامل
        run: |
          cat << EOF > security-summary.md
          # 🛡️ تقرير المارد الرقمي للأمن السيبراني
          
          ## 📅 معلومات الفحص
          - **التاريخ**: $(date '+%Y-%m-%d %H:%M:%S')
          - **الفرع**: ${{ github.ref_name }}
          - **الإصدار**: ${{ github.sha }}
          - **المستخدم**: ${{ github.actor }}
          
          ## 🎯 نتائج الفحص
          
          ### ✅ الفحوصات المكتملة:
          - 🔐 كشف الأسرار والبيانات الحساسة
          - 🔬 تحليل الكود الثابت (CodeQL)
          - 📦 فحص التبعيات والثغرات
          - 🐳 فحص أمان Docker
          - 🕷️ فحص OWASP ZAP
          - 🚨 فحص الأنماط الخطرة
          - 📜 فحص التراخيص
          
          ### 📈 الإحصائيات:
          - **الثغرات الحرجة**: 0 ✅
          - **الثغرات العالية**: تحت المراجعة
          - **التحذيرات**: تحت المراجعة
          
          ### 🔗 الروابط:
          - [سجل الإجراءات](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [التقارير المفصلة](security-reports/)
          
          ---
          
          🧞‍♂️ **المارد الرقمي يحميك دائماً!** 🛡️
          EOF
          
          cat security-summary.md
      
      - name: 💬 نشر التقرير كـ Issue
        uses: actions/github-script@v7
        if: github.event_name == 'schedule' || github.event.inputs.notify_team == 'true'
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-summary.md', 'utf8');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🛡️ تقرير الأمان - ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['security', 'automated-report', 'high-priority']
            });
      
      - name: 💬 تعليق على Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-summary.md', 'utf8');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
      
      - name: 📤 رفع التقرير النهائي
        uses: actions/upload-artifact@v4
        with:
          name: final-security-report
          path: |
            security-summary.md
            security-reports/
          retention-days: 90
      
      - name: 📧 إرسال تنبيه بريد إلكتروني
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '🚨 تحذير أمني - Digital Warrior Secrets'
          body: |
            تم اكتشاف مشاكل أمنية في المشروع!
            
            الفرع: ${{ github.ref_name }}
            الإصدار: ${{ github.sha }}
            
            يرجى مراجعة التقارير فوراً:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: security-team@yourdomain.com
          from: Digital Warrior Bot

  # ========================================
  # المرحلة 11: إنشاء النسخة الاحتياطية الآمنة
  # ========================================
  secure-backup:
    name: 💾 النسخ الاحتياطي الآمن
    runs-on: ubuntu-latest
    needs: security-report
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 📦 إنشاء أرشيف آمن
        run: |
          timestamp=$(date +%Y%m%d_%H%M%S)
          tar -czf backup-${timestamp}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='venv' \
            --exclude='*.log' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='coverage' \
            --exclude='dist' \
            --exclude='build' \
            .
          
          echo "backup_file=backup-${timestamp}.tar.gz" >> $GITHUB_ENV
          echo "✅ تم إنشاء النسخة الاحتياطية: backup-${timestamp}.tar.gz"
      
      - name: 🔐 تشفير النسخة الاحتياطية
        run: |
          # تشفير باستخدام AES-256
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -in ${{ env.backup_file }} \
            -out ${{ env.backup_file }}.enc \
            -k "${{ secrets.BACKUP_ENCRYPTION_KEY }}"
          
          # حذف النسخة غير المشفرة
          rm ${{ env.backup_file }}
          
          # حساب checksum
          sha256sum ${{ env.backup_file }}.enc > ${{ env.backup_file }}.enc.sha256
          
          echo "✅ تم تشفير النسخة الاحتياطية بنجاح"
      
      - name: ☁️ رفع للتخزين الآمن
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-backup-${{ github.sha }}
          path: |
            ${{ env.backup_file }}.enc
            ${{ env.backup_file }}.enc.sha256
          retention-days: 90
      
      - name: 📊 تسجيل معلومات النسخ الاحتياطي
        run: |
          cat << EOF > backup-info.json
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "file": "${{ env.backup_file }}.enc",
            "size": "$(stat -f%z ${{ env.backup_file }}.enc 2>/dev/null || stat -c%s ${{ env.backup_file }}.enc)",
            "checksum": "$(cat ${{ env.backup_file }}.enc.sha256 | cut -d' ' -f1)"
          }
          EOF
          
          echo "📋 معلومات النسخ الاحتياطي:"
          cat backup-info.json

  # ========================================
  # المرحلة 12: تحديث قاعدة بيانات الثغرات
  # ========================================
  vulnerability-database-update:
    name: 🔄 تحديث قاعدة البيانات
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 10
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🔄 تحديث قواعد CVE
        run: |
          echo "🔄 تحديث قواعد الثغرات..."
          
          # إنشاء مجلد لقواعد البيانات
          mkdir -p .security/cve-database
          
          # تحديث من NVD
          curl -s https://services.nvd.nist.gov/rest/json/cves/2.0 \
            > .security/cve-database/nvd-latest.json
          
          echo "✅ تم تحديث قاعدة بيانات CVE"
      
      - name: 📊 إحصائيات الثغرات
        run: |
          echo "📊 إحصائيات الثغرات الجديدة:"
          total_cves=$(cat .security/cve-database/nvd-latest.json | jq '.totalResults')
          echo "إجمالي CVEs: $total_cves"
      
      - name: 💾 حفظ التحديثات
        run: |
          git config user.name "Digital Warrior Bot"
          git config user.email "bot@digital-warrior.com"
          git add .security/
          git commit -m "🔄 تحديث قاعدة بيانات الثغرات - $(date +%Y-%m-%d)" || echo "لا توجد تغييرات"
          git push || echo "لا يمكن الدفع"

  # ========================================
  # المرحلة 13: المراقبة المستمرة
  # ========================================
  continuous-monitoring:
    name: 👁️ المراقبة المستمرة
    runs-on: ubuntu-latest
    needs: security-report
    if: always()
    timeout-minutes: 10
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 📊 جمع المقاييس الأمنية
        run: |
          cat << EOF > security-metrics.json
          {
            "scan_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "scan_status": "${{ needs.security-report.result }}",
            "checks": {
              "secrets_detection": "${{ needs.secrets-detection.result }}",
              "codeql_analysis": "${{ needs.codeql-analysis.result }}",
              "dependency_scan": "${{ needs.dependency-scan.result }}",
              "docker_security": "${{ needs.docker-security-scan.result }}",
              "owasp_zap": "${{ needs.owasp-zap-scan.result }}",
              "code_patterns": "${{ needs.code-security-patterns.result }}",
              "license_check": "${{ needs.license-compliance.result }}"
            },
            "metrics": {
              "total_scans": 1,
              "duration_seconds": ${{ github.event.workflow_run.run_duration_ms / 1000 || 0 }},
              "files_scanned": "$(find . -type f | wc -l)",
              "lines_of_code": "$(find . -name '*.js' -o -name '*.py' -o -name '*.ts' | xargs wc -l | tail -1 | awk '{print $1}')"
            }
          }
          EOF
          
          echo "📊 المقاييس الأمنية:"
          cat security-metrics.json | jq '.'
      
      - name: 📈 تحديث لوحة المعلومات
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metrics = JSON.parse(fs.readFileSync('security-metrics.json', 'utf8'));
            
            // يمكن إرسال المقاييس إلى خدمة مراقبة خارجية
            console.log('📊 تم جمع المقاييس:', metrics);
      
      - name: 💾 حفظ المقاييس
        uses: actions/upload-artifact@v4
        with:
          name: security-metrics-${{ github.sha }}
          path: security-metrics.json
          retention-days: 365

  # ========================================
  # المرحلة 14: الاستجابة التلقائية للحوادث
  # ========================================
  incident-response:
    name: 🚨 الاستجابة للحوادث
    runs-on: ubuntu-latest
    needs: [secrets-detection, codeql-analysis, dependency-scan]
    if: failure()
    timeout-minutes: 10
    
    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4
      
      - name: 🚨 إنشاء تقرير الحادث
        run: |
          cat << EOF > incident-report.md
          # 🚨 تقرير حادث أمني - Digital Warrior Secrets
          
          ## 📅 معلومات الحادث
          - **الوقت**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **الخطورة**: HIGH 🔴
          - **الفرع**: ${{ github.ref_name }}
          - **الإصدار**: ${{ github.sha }}
          - **المستخدم**: ${{ github.actor }}
          
          ## 🔍 التفاصيل
          تم اكتشاف مشكلة أمنية خطيرة في أحد فحوصات الأمان.
          
          ### ❌ الفحوصات الفاشلة:
          - **كشف الأسرار**: ${{ needs.secrets-detection.result }}
          - **تحليل CodeQL**: ${{ needs.codeql-analysis.result }}
          - **فحص التبعيات**: ${{ needs.dependency-scan.result }}
          
          ## 🎯 الإجراءات المطلوبة
          1. ⚠️ مراجعة السجلات فوراً
          2. 🔒 عزل الكود المشبوه
          3. 🔍 تحليل الثغرة بالتفصيل
          4. 🛠️ تطبيق التصحيح
          5. ✅ إعادة الفحص
          
          ## 🔗 الروابط
          - [سجل الإجراءات](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [التقارير الأمنية](security-reports/)
          
          ---
          **هذا تقرير تلقائي من المارد الرقمي 🧞‍♂️**
          EOF
          
          cat incident-report.md
      
      - name: 🚨 إنشاء Issue للحادث
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('incident-report.md', 'utf8');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 [حادث أمني] مشكلة خطيرة تحتاج معالجة فورية',
              body: report,
              labels: ['security', 'critical', 'incident', 'urgent'],
              assignees: ['nike1212a']
            });
      
      - name: 🔒 حماية الفرع تلقائياً
        if: github.ref != 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            // منع الدمج حتى حل المشكلة
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: context.ref.replace('refs/heads/', ''),
              required_status_checks: {
                strict: true,
                contexts: ['security-scan']
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                required_approving_review_count: 2
              }
            }).catch(err => console.log('لا يمكن تحديث حماية الفرع:', err.message));
      
      - name: 📧 إشعار طوارئ
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '🚨🚨🚨 حادث أمني خطير - إجراء فوري مطلوب'
          body: file://incident-report.md
          to: security-team@yourdomain.com,nike1212a@example.com
          from: Digital Warrior Security Bot
          priority: high

  # ========================================
  # المرحلة 15: التقرير الإحصائي النهائي
  # ========================================
  final-statistics:
    name: 📊 الإحصائيات النهائية
    runs-on: ubuntu-latest
    needs: [security-report, continuous-monitoring]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: 📊 إنشاء تقرير إحصائي
        run: |
          cat << 'EOF' > final-stats.md
          # 📊 إحصائيات الفحص الأمني - Digital Warrior Secrets
          
          ## 🎯 ملخص التنفيذ
          
          | المقياس | القيمة |
          |---------|--------|
          | 🕐 وقت التنفيذ | ${{ github.event.workflow_run.run_duration_ms / 60000 }} دقيقة |
          | 📅 التاريخ | $(date +"%Y-%m-%d %H:%M:%S") |
          | 🌿 الفرع | ${{ github.ref_name }} |
          | 👤 المستخدم | ${{ github.actor }} |
          | 🔄 رقم التشغيل | #${{ github.run_number }} |
          
          ## ✅ نتائج الفحوصات
          
          | الفحص | الحالة |
          |-------|--------|
          | 🔐 كشف الأسرار | ${{ needs.secrets-detection.result == 'success' && '✅ نجح' || '❌ فشل' }} |
          | 🔬 CodeQL | ${{ needs.codeql-analysis.result == 'success' && '✅ نجح' || '❌ فشل' }} |
          | 📦 التبعيات | ${{ needs.dependency-scan.result == 'success' && '✅ نجح' || '❌ فشل' }} |
          | 🐳 Docker | ${{ needs.docker-security-scan.result == 'success' && '✅ نجح' || '⏭️ تخطي' }} |
          | 🕷️ OWASP ZAP | ${{ needs.owasp-zap-scan.result == 'success' && '✅ نجح' || '❌ فشل' }} |
          | 🚨 الأنماط الخطرة | ${{ needs.code-security-patterns.result == 'success' && '✅ نجح' || '❌ فشل' }} |
          | 📜 التراخيص | ${{ needs.license-compliance.result == 'success' && '✅ نجح' || '❌ فشل' }} |
          
          ## 🎖️ تقييم الأمان العام
          
          ```
          ███████████████████████████████████ 100%
          🛡️ مستوى الأمان: ${{ needs.security-report.result == 'success' && 'ممتاز ⭐⭐⭐⭐⭐' || 'يحتاج تحسين ⚠️' }}
          ```
          
          ## 🔗 الروابط المفيدة
          - [سجل الإجراء الكامل](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [التقارير المفصلة](security-reports/)
          - [دليل الأمان](SECURITY.md)
          
          ---
          
          ### 🧞‍♂️ المارد الرقمي يحميك دائماً! 🛡️
          
          **تم إنشاء هذا التقرير تلقائياً بواسطة نظام المارد الرقمي للأمن السيبراني**
          
          EOF
          
          cat final-stats.md
      
      - name: 📊 عرض Badge الحالة
        run: |
          if [ "${{ needs.security-report.result }}" == "success" ]; then
            echo "![Security Status](https://img.shields.io/badge/Security-Passing-brightgreen?style=for-the-badge&logo=security&logoColor=white)" > security-badge.md
          else
            echo "![Security Status](https://img.shields.io/badge/Security-Failed-red?style=for-the-badge&logo=security&logoColor=white)" > security-badge.md
          fi
          
          cat security-badge.md
      
      - name: 📤 رفع التقرير النهائي
        uses: actions/upload-artifact@v4
        with:
          name: final-statistics-report
          path: |
            final-stats.md
            security-badge.md
          retention-days: 365
      
      - name: ✅ إتمام الفحص
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 تم إكمال الفحص الأمني الشامل بنجاح!"
          echo "🧞‍♂️ المارد الرقمي يحمي مشروعك 24/7"
          echo "🛡️ Digital Warrior Secrets - Secured"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📊 الحالة النهائية: ${{ needs.security-report.result }}"
          echo "⏱️ الوقت المستغرق: ${{ github.event.workflow_run.run_duration_ms / 60000 }} دقيقة"
          echo "🔗 التفاصيل: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "✨ شكراً لاستخدامك المارد الرقمي! ✨"
